<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Download Hub</title>
<link rel="icon" type="image/png" sizes="64x64" href="logo.png">

<style>
:root {
  --bg: #0f1115;
  --card: #161a22;
  --accent: #ff9f1c;
  --text: #f5f6fa;
  --muted: #b2b6c2;
  --button: #5865F2;
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: Inter, system-ui, sans-serif; }

body {
  background: #0f1115;
  color: var(--text);
  min-height: 100vh;
  padding: 2.5rem;
}

.container {
  max-width: 1100px;
  margin: auto;
}

/* HEADER */
header {
  background: linear-gradient(145deg, #1b2030, var(--card));
  border-radius: 18px;
  padding: 2.5rem;
  position: relative;
}

.title {
  display: flex;
  align-items: center;
  gap: 1rem;
  font-size: 2.5rem;
}

.subtitle {
  color: var(--muted);
  margin-top: 10px;
}

/* FIXED BUTTONS */
.top-buttons {
  position: absolute;
  top: 25px;
  right: 30px;
  display: flex;
  gap: 10px;
}

.proxy-btn {
  padding: 10px 18px;
  border-radius: 10px;
  background: var(--button);
  color: white;
  text-decoration: none;
  font-weight: 700;
  border: none;
  cursor: pointer;
}

/* DOWNLOAD GRID */
.downloads {
  margin-top: 30px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px,1fr));
  gap: 20px;
}

.card {
  background: var(--card);
  padding: 20px;
  border-radius: 15px;
}

/* ===== GAMES OVERLAY ===== */
#gamesOverlay {
  position: fixed;
  inset: 0;
  background: #0f1115;
  z-index: 999;
  display: none;
  flex-direction: column;
}

#gamesHeader {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  background: #161a22;
}

#gamesContainer {
  flex: 1;
}
</style>
</head>

<body>

<!-- ===== GAMES OVERLAY ===== -->
<div id="gamesOverlay">
  <div id="gamesHeader">
    <span>Game Hub</span>
    <button id="closeGames">X</button>
  </div>
  <div id="gamesContainer"></div>
</div>

<main class="container">

<header>
  <h1 class="title">
    <img src="logo.png" width="40">
    Download Hub
  </h1>

  <p class="subtitle">Official downloads hosted directly from this site.</p>

  <!-- BUTTONS -->
  <div class="top-buttons">
    <a href="https://greengru34alt.github.io/staticproxFIX/" class="proxy-btn">Proxy</a>
    <button id="openGames" class="proxy-btn" style="background:#ff9f1c;">Games</button>
  </div>
</header>

<section class="downloads" id="cardsGrid">
  <!-- your cards will load here -->
</section>

</main>

<!-- ===== LUMIN SDK ===== -->
<script src="https://cdn.jsdelivr.net/gh/luminsdk/script@latest/lumin.min.js"></script>

<script>
// ===== YOUR EXISTING INIT (kept minimal so nothing breaks) =====
async function init(){
  try{
    const cards = await fetch('cards.json').then(r=>r.json());
    const grid = document.getElementById('cardsGrid');
    grid.innerHTML = '';

    cards.forEach(card=>{
      const el = document.createElement('div');
      el.className = 'card';
      el.innerHTML = `
        <h3>${card.name}</h3>
        <p>${card.description}</p>
        <a href="${card.asset}" download>Download</a>
      `;
      grid.appendChild(el);
    });

  }catch(e){
    console.log("cards failed");
  }
}

// ===== START SITE =====
init();


// ===== LUMIN GAMES =====
let luminLoaded = false;

document.getElementById('openGames').onclick = () => {
  document.getElementById('gamesOverlay').style.display = 'flex';

  if (!luminLoaded) {
    setTimeout(() => {
      Lumin.init({
        container: '#gamesContainer',
        theme: 'dark'
      });
      luminLoaded = true;
    }, 100);
  }
};

document.getElementById('closeGames').onclick = () => {
  document.getElementById('gamesOverlay').style.display = 'none';
};
</script>

</body>
</html>
